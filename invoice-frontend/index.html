<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Finance - IA Fraud Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #030712;
      --card: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #6366f1;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f3f4f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body {
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 2rem;
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { margin-bottom: 3rem; text-align: center; }
    h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    .grid { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
    .panel { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    h2 { font-size: 1.25rem; margin-bottom: 1.5rem; color: #9ca3af; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; }
    
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem; }
    input { width: 100%; background: #0b0f1a; border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem; color: white; transition: all 0.2s; }
    input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    
    button { width: 100%; background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 1rem; margin-top: 1rem; }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
    button:active { transform: translateY(0); }

    .live-feed { display: flex; flex-direction: column; gap: 1rem; }
    .event-card { 
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 20px; padding: 1.25rem;
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: grid; grid-template-columns: 1fr auto; gap: 1rem;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .steps { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .step { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; }
    .step.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .step.done { background: var(--success); }
    .step.fraud { background: var(--danger); }
    
    .badge { padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
    .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .badge-fraud { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

    .ai-box { margin-top: 0.75rem; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 0.75rem; font-size: 0.85rem; border-left: 3px solid #c084fc; color: #d8b4fe; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Deep Finance IA</h1>
      <p style="color: #6b7280">Sistema de Faturas com Kafka & Gemini 1.5</p>
    </header>

    <div class="grid">
      <div class="panel">
        <h2>EMISSÃO DE FATURA</h2>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="amt" value="250.00">
        </div>
        <div class="form-group">
          <label>Descrição do Serviço</label>
          <input type="text" id="desc" value="Consultoria de Software Cloud">
        </div>
        <button id="genBtn" onclick="emit()">EMITIR AGORA</button>
        
        <div style="margin-top: 2rem; font-size: 0.8rem; color: #4b5563;">
          <p>📡 Conexão WebSocket: <span id="wsStatus" style="color: var(--danger)">Desconectado</span></p>
        </div>
      </div>

      <div class="live-feed" id="feed">
        <div style="text-align: center; color: #4b5563; padding: 4rem;">
          Aguardando eventos do Kafka...
        </div>
      </div>
    </div>
  </div>

  <script>
    const socket = io('http://localhost:3001');
    const feed = document.getElementById('feed');
    const wsStatus = document.getElementById('wsStatus');

    socket.on('connect', () => {
      wsStatus.innerText = 'Online';
      wsStatus.style.color = 'var(--success)';
    });

    socket.on('disconnect', () => {
      wsStatus.innerText = 'Offline';
      wsStatus.style.color = 'var(--danger)';
    });

    // Estado local das faturas para atualizar o mesmo card
    const invoices = {};

    function getCard(id, data) {
      if (invoices[id]) return invoices[id];
      
      if (feed.innerText.includes('Aguardando')) feed.innerHTML = '';
      
      const div = document.createElement('div');
      div.className = 'event-card';
      div.id = 'inv-' + id;
      feed.prepend(div);
      invoices[id] = div;
      return div;
    }

    // LISTENER 1: CRIADA (Producer)
    socket.on('invoice_created', (data) => {
      const card = getCard(data.id, data);
      card.innerHTML = `
        <div>
          <div style="font-size: 0.75rem; color: #6b7280; margin-bottom: 0.25rem;">ID: ${data.id}</div>
          <div style="font-size: 1.25rem; font-weight: 700;">R$ ${parseFloat(data.amount).toFixed(2)}</div>
          <div style="font-size: 0.9rem; color: #9ca3af;">${data.description}</div>
          <div class="steps">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
          </div>
        </div>
        <div style="text-align: right;">
          <span class="badge badge-pending">Transmitindo...</span>
        </div>
      `;
    });

    // LISTENER 2: SALVA (Consumer 1)
    socket.on('invoice_saved', (data) => {
        const card = getCard(data.id, data);
        const steps = card.querySelectorAll('.step');
        steps[0].classList.add('done');
        steps[1].classList.add('active');
        card.querySelector('.badge').innerText = 'Analisando Fraude (IA)...';
    });

    // LISTENER 3: FINALIZADA (Consumer 2 / IA)
    socket.on('invoice_processed', (data) => {
        const card = getCard(data.id, data);
        const steps = card.querySelectorAll('.step');
        steps[0].classList.add('done');
        steps[1].classList.add('done');
        
        const badge = card.querySelector('.badge');
        const isFraud = data.status === 'FRAUD_DETECTED';
        
        steps[2].className = 'step ' + (isFraud ? 'fraud' : 'done');
        badge.className = 'badge ' + (isFraud ? 'badge-fraud' : 'badge-success');
        badge.innerText = isFraud ? 'Fraude Detectada' : 'Processada';

        if (data.aiAnalysis) {
            const aiBox = document.createElement('div');
            aiBox.className = 'ai-box';
            aiBox.innerHTML = `<strong>IA Gemini (${data.aiAnalysis.score}% Risco):</strong> ${data.aiAnalysis.reason}`;
            card.querySelector('div').appendChild(aiBox);
        } else if (data.aiOffline) {
            const aiBox = document.createElement('div');
            aiBox.className = 'ai-box';
            aiBox.style.borderLeftColor = 'var(--warning)';
            aiBox.innerHTML = `<strong>IA Temporariamente Indisponível:</strong> Aguardando quota da API para nova análise.`;
            card.querySelector('div').appendChild(aiBox);
        }
    });

    async function emit() {
      const amt = document.getElementById('amt').value;
      const desc = document.getElementById('desc').value;
      await fetch('http://localhost:3001/invoices', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: parseFloat(amt), description: desc })
      });
    }
  </script>
</body>
</html>
